openapi: '3.1.0'
info:
  title: InjectionTest
  version: 1.0.0
servers:
  - url: https://example.com/api
paths:
  /status:
    get:
      operationId: getStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
components:
  schemas:
    Status:
      type: string
      enum:
        - healthy
        - '"# ; try FileManager.default.createDirectory(atPath: "/tmp/openapi_injection_pwned", withIntermediateDirectories: true) ; let _x = #"'
