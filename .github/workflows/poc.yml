name: OpenAPI Code Injection PoC
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  poc:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Show malicious schema
        run: cat Sources/poc-openapi-injection/openapi.yaml
      - name: Build (triggers injection)
        run: |
          echo "BEFORE: $(test -d /tmp/openapi_injection_pwned && echo EXISTS || echo NOT_EXISTS)"
          swift build 2>&1 || true
          echo "AFTER: $(test -d /tmp/openapi_injection_pwned && echo EXISTS || echo NOT_EXISTS)"
      - name: State change proof
        run: |
          if [ -d /tmp/openapi_injection_pwned ]; then
            echo "INJECTION CONFIRMED: directory created by injected code at build time"
          else
            GENERATED=$(find .build -name "Types.swift" 2>/dev/null | head -1)
            [ -n "$GENERATED" ] && grep -n '"#\|#"' "$GENERATED" | head -10 || echo "Check build output above"
          fi
