name: OpenAPI Code Injection PoC
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  poc:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Show malicious schema
        run: cat Sources/poc-openapi-injection/openapi.yaml
      - name: Build and run (triggers injection + executes payload)
        run: |
          echo "BEFORE: $(test -f /tmp/openapi_injection_pwned && echo EXISTS || echo NOT_EXISTS)"
          swift run 2>&1 || true
          echo "AFTER: $(test -f /tmp/openapi_injection_pwned && echo EXISTS || echo NOT_EXISTS)"
      - name: State change proof
        run: |
          if [ -f /tmp/openapi_injection_pwned ]; then
            echo "========================================"
            echo "STATE CHANGE PROVEN — RCE CONFIRMED"
            echo "========================================"
            echo "File content: $(cat /tmp/openapi_injection_pwned)"
          else
            echo "File not found"
            find .build -name "Types.swift" 2>/dev/null | head -1 | xargs grep -n "PWNED" 2>/dev/null || true
          fi
